name: Test (Dev Branch)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # - name: Run Lint
      #   run: npm run lint

      - name: Run Unit Tests (Services)
        # Menjalankan unit test di direktori service/ yang bersifat independen
        run: npx jest service/

      - name: Run All Unit Tests with Coverage
        if: always()
        run: npx jest service/ --coverage
