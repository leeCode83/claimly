name: Staging Test (PR to Staging)

on:
  pull_request:
    branches:
      - stagging

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Official Redis service container for integration tests
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: supabase start

      - name: Configure Environment Variables
        run: |
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_BASE_URL=http://localhost:3000" >> $GITHUB_ENV
          
          # Extract Supabase local connection info using jq
          # Handles both casing variants just in case
          STATUS_JSON=$(supabase status -o json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS_JSON | jq -r '.api_url // .API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo $STATUS_JSON | jq -r '.anon_key // .ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $STATUS_JSON | jq -r '.service_role_key // .SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Start Next.js (Dev Mode In Background)
        run: npm run dev &

      - name: Wait for Next.js to be ready
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Unit Tests (Services)
        run: npx jest service/

      - name: Run Integration Tests
        run: npx jest test/integration.test.ts

      - name: Stop Supabase
        if: always()
        run: supabase stop
