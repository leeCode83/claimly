name: Staging CI/CD (PR to Staging)

on:
  pull_request:
    branches:
      - stagging

jobs:
  # ===========================================================================
  # JOB 1: Unit Tests
  # Pastikan semua unit test lulus sebelum melanjutkan ke build & push
  # ===========================================================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ===========================================================================
  # JOB 2: Build Docker Images & Push to Docker Hub
  # Hanya berjalan jika Job 1 (test) berhasil lulus
  # ===========================================================================
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test  # Tunggu job 'test' selesai dan lulus

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Buat ulang .env.docker dari GitHub Secrets
      # File ini tidak ada di repo (ada di .gitignore), jadi harus dibuat di runner
      - name: Create .env.docker from secrets
        run: |
          cat > .env.docker << EOF
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_KEYCLOAK_URL=${{ secrets.NEXT_PUBLIC_KEYCLOAK_URL }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_CHATBOT_WS_URL=${{ secrets.NEXT_PUBLIC_CHATBOT_WS_URL }}
          NEXT_PUBLIC_SUPABASE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KEYCLOAK_CLIENT_ID=claimly-supabase
          KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          REDIS_HOST=redis-stack
          REDIS_PORT=6379
          REDIS_URL=redis://redis-stack:6379
          POSTGRES_PASSWORD=postgres
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SUPABASE_INTERNAL_URL=${{ secrets.SUPABASE_INTERNAL_URL }}
          KEYCLOAK_INTERNAL_URL=${{ secrets.KEYCLOAK_INTERNAL_URL }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
          SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_TELEMETRY_DISABLED=1
          NODE_ENV=production
          EOF

      # Build Next.js menggunakan .env.docker (sama seperti di lokal)
      # Menghasilkan folder .next/standalone yang akan disalin ke Docker image
      - name: Build Next.js (npm run build:docker)
        run: npm run build:docker

      # Login ke Docker Hub menggunakan credentials dari GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Setup Docker Buildx untuk multi-platform support (opsional tapi best practice)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build dan push image untuk Next.js app (claimly)
      - name: Build & Push claimly image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/claimly:staging

      # Build dan push image untuk ZKP Worker (claimly-worker)
      - name: Build & Push claimly-worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/claimly-worker:staging
