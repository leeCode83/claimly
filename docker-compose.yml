# =============================================================================
# DOCKER COMPOSE FOR CLAIMLY
# =============================================================================
# Penjelasan:
# - Ini HANYA untuk container Next.js (Claimly frontend) dan Worker
# - Supabase, Redis, dan Keycloak menggunakan container yang SUDAH ADA
# - Semua secrets dibaca dari .env.docker (tidak pernah hardcoded di sini)
# - File ini AMAN untuk di-commit ke Git
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # CLAIMLY FRONTEND (Next.js)
  # ---------------------------------------------------------------------------
  claimly:
    build:
      context: .
      dockerfile: Dockerfile
    
    image: claimly:latest

    # Port mapping - accessible dari host
    ports:
      - "3000:3000"

    # Semua environment variables (termasuk secrets) dibaca dari .env.docker
    # File ini ada di .gitignore dan tidak pernah masuk ke Git
    env_file:
      - .env.docker

    # Networking - gunakan network yang sama dengan Supabase/Keycloak
    networks:
      - claimly_network

    # Restart policy - restart container jika crash
    restart: unless-stopped

    # Healthcheck - pastikan container healthy sebelum serving
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # CLAIMLY ZKP WORKER
  # ---------------------------------------------------------------------------
  claimly-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker

    image: claimly-worker:latest

    # Secrets dan config worker juga dibaca dari .env.docker
    env_file:
      - .env.docker

    # Networking - gunakan network yang sama
    networks:
      - claimly_network

    # Restart policy
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
# Gunakan "external: true" karena Supabase/Keycloak/Redis SUDAH ADA sebagai
# container terpisah. Network dibuat manual sebelum menjalankan compose:
#   docker network create claimly_network
# =============================================================================
networks:
  claimly_network:
    external: true

# =============================================================================
# CATATAN PENGGUNAAN
# =============================================================================
#
# SEBELUM MENJALANKAN:
# 1. Pastikan Supabase, Redis, dan Keycloak sudah berjalan
# 2. Buat network jika belum ada:
#    docker network create claimly_network
# 3. Hubungkan container yang sudah ada ke network:
#    docker network connect claimly_network supabase_kong_claimly
#    docker network connect claimly_network supabase_db_claimly
#    docker network connect claimly_network keycloak
#    docker network connect claimly_network redis-stack
# 4. Salin dan isi file environment:
#    cp .env.example .env.docker
#
# BUILD & JALANKAN:
#    npm run build:docker
#    docker-compose build claimly
#    docker-compose up -d claimly
#
# MELIHAT LOGS:
#    docker-compose logs -f claimly
#
# STOP:
#    docker-compose down
#
# =============================================================================
